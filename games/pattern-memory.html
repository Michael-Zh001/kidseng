<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆卡片游戏 - KidsEng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(180deg, #E8F4FD 0%, #FFF5E6 100%);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #FF6B9D 0%, #C44569 100%);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background: white;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #FF6B9D;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .game-container {
            padding: 20px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 28px;
            font-weight: bold;
            color: #2D3436;
            margin-bottom: 10px;
        }

        .game-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00CEC9;
        }

        .stat-label {
            font-size: 12px;
            color: #636E72;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 400px;
            margin: 0 auto;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #74B9FF 0%, #0984E3 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(116, 185, 255, 0.4);
            transition: all 0.3s ease;
            position: relative;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .card.flipped {
            background: white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .card.matched {
            background: linear-gradient(135deg, #00CEC9 0%, #00B894 100%);
            animation: matchPulse 0.5s ease;
        }

        @keyframes matchPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card .back-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #74B9FF 0%, #0984E3 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: white;
            backface-visibility: hidden;
        }

        .back-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #FF6B9D 0%, #C44569 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.4);
            cursor: pointer;
        }

        .restart-btn {
            background: linear-gradient(135deg, #00CEC9 0%, #00B894 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 206, 201, 0.4);
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span class="logo-icon">ABC</span>
            <span class="logo-text">KidsEng</span>
        </div>
        <div style="color: white; font-weight: bold;">记忆卡片游戏</div>
    </div>

    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">🃏 图案记忆卡片</h1>
            <div class="game-stats">
                <div class="stat-item">
                    <div class="stat-value" id="moves">0</div>
                    <div class="stat-label">步数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="matches">0</div>
                    <div class="stat-label">配对</div>
                </div>
            </div>
        </div>

        <div id="gameBoard" class="game-board"></div>

        <div style="text-align: center;">
            <button class="restart-btn" onclick="initGame()">🔄 重新开始</button>
        </div>
    </div>

    <div class="back-btn" onclick="goBack()">←</div>

    <script>
        const patterns = ['🐱', '🐕', '🐘', '🐟', '🦁', '🐼', '🦋', '🐦'];
        let cards = [];
        let flippedCards = [];
        let moves = 0;
        let matches = 0;

        function initGame() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            cards = [...patterns, ...patterns];
            cards.sort(() => Math.random() - 0.5);
            
            flippedCards = [];
            moves = 0;
            matches = 0;
            
            document.getElementById('moves').textContent = '0';
            document.getElementById('matches').textContent = '0';

            cards.forEach((pattern, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.pattern = pattern;
                card.dataset.index = index;
                card.innerHTML = `<div class="back-face">?</div>`;
                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });
        }

        function flipCard(e) {
            const card = e.target.closest('.card');
            
            if (card.classList.contains('flipped') || 
                card.classList.contains('matched') || 
                flippedCards.length >= 2) {
                return;
            }

            card.classList.add('flipped');
            card.innerHTML = card.dataset.pattern;
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            
            if (card1.dataset.pattern === card2.dataset.pattern) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matches++;
                document.getElementById('matches').textContent = matches;
                flippedCards = [];
                
                if (matches === patterns.length) {
                    setTimeout(() => {
                        alert(`🎉 恭喜完成！\n\n用了 ${moves} 步完成配对！\n\n太棒了！🌟`);
                    }, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.innerHTML = `<div class="back-face">?</div>`;
                    card2.innerHTML = `<div class="back-face">?</div>`;
                    flippedCards = [];
                }, 1000);
            }
        }

        function goBack() {
            window.location.href = '../games.html';
        }

        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
